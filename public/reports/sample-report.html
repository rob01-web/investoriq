<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>InvestorIQ Sample Materials</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #5f6878;
        --line: #e5e7eb;
        --bg: #f8fafc;
        --panel: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 640px);
        padding: 40px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 28px;
        line-height: 1.2;
        font-weight: 600;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>InvestorIQ Sample Materials</h1>
      <p>InvestorIQ sample materials are being updated. Please contact InvestorIQ to request current sample reports.</p>
    </main>
  </body>
</html>
